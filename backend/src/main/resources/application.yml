spring:
  application:
    name: gavioes-fc-sorteio

  profiles:
    active: dev

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:gavioesfc
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

server:
  port: 8080

app:
  jwt:
    secret: dev-secret-key-gavioes-fc-sorteio-2024-minimum-256-bits-long-key
    expiration: 86400000

  cors:
    allowed-origins: http://localhost:5173

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gavioesfc}?sslmode=require
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:gavioesfc}
    password: ${DB_PASSWORD:gavioesfc}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
