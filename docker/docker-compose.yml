version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gavioes-fc-db
    environment:
      POSTGRES_DB: gavioesfc
      POSTGRES_USER: gavioesfc
      POSTGRES_PASSWORD: gavioesfc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gavioesfc"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: gavioes-fc-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gavioesfc
      DB_USERNAME: gavioesfc
      DB_PASSWORD: gavioesfc
      JWT_SECRET: docker-dev-secret-key-gavioes-fc-sorteio-2024-minimum-256-bits
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: gavioes-fc-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
